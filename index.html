<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Atlas do Amazonas — SEINFRA/AM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    :root{--azul:#002D72;--azul-hover:#003A8C;--azul-claro:#EBF0FA;--azul-borda:#C4D0E8;--amarelo:#F5A623;--verde:#007B3E;--vermelho:#C0392B;--roxo:#6C3483;--laranja:#E67E22;--rosa:#C2185B;--marrom:#8B6914;--cinza-txt:#1A2540;--cinza-med:#4A5568;--cinza-aux:#8896A8;--cinza-bg:#F5F7FB;--borda:#E0E6F0;--branco:#FFFFFF;--font:'Outfit',sans-serif;--shadow:0 2px 16px rgba(0,45,114,.09),0 0 0 1px var(--borda);--shadow-lg:0 8px 32px rgba(0,45,114,.14);--radius:10px;--gov-azul:#293258;--gov-verde:#33A23D}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
    body{font-family:var(--font);background:var(--cinza-bg);color:var(--cinza-txt);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
    ::selection{background:rgba(0,45,114,.14)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}@keyframes spin{to{transform:rotate(360deg)}}@keyframes slideIn{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}

    /* GOV HEADER — padrao viario */
    .topbar{background:var(--azul);padding:.4rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:1000}
    .topbar-left{font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.5);font-weight:500}
    .topbar-right{font-size:.62rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--amarelo);display:flex;align-items:center;gap:.5rem}
    .topbar-dot{width:6px;height:6px;border-radius:50%;background:var(--amarelo);box-shadow:0 0 8px var(--amarelo);animation:pulse 2s ease-in-out infinite}
    .site-header{background:var(--branco);border-bottom:2px solid var(--azul);padding:.7rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:1000;box-shadow:0 2px 12px rgba(0,45,114,.06);position:sticky;top:0}
    .header-brand{display:flex;align-items:center;gap:.8rem}
    .brand-escudo{width:40px;height:40px;border-radius:8px;background:var(--azul);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
    .brand-sup{font-size:.58rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--cinza-aux)}
    .brand-name{font-size:1rem;font-weight:800;color:var(--azul)}.brand-name span{color:var(--amarelo)}
    .header-nav{display:flex;align-items:center;gap:.75rem}
    .header-badge{font-size:.65rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--azul);background:var(--azul-claro);border:1.5px solid var(--azul-borda);padding:.3em .85em;border-radius:100px}
    .header-back{font-size:.68rem;font-weight:600;color:var(--azul);text-decoration:none;display:flex;align-items:center;gap:.3rem;opacity:.7;transition:opacity .2s}.header-back:hover{opacity:1}
    @media(max-width:600px){.header-badge{display:none}}

    .map-wrap{flex:1;position:relative;min-height:0}#map{width:100%;height:100%;background:#c8d8e8}

    /* LAYER PANEL */
    .lp{position:absolute;top:10px;right:10px;z-index:800;background:var(--branco);border-radius:var(--radius);box-shadow:var(--shadow-lg);width:280px;max-height:calc(100% - 20px);display:flex;flex-direction:column;transition:width .2s;overflow:hidden}
    .lp.collapsed{width:42px}.lp.collapsed .lp-body,.lp.collapsed .lp-ttl,.lp.collapsed .lp-cnt,.lp.collapsed .lp-srch{display:none}
    .lp-hdr{padding:.6rem .85rem;display:flex;align-items:center;gap:.5rem;border-bottom:1px solid var(--borda);background:var(--azul);cursor:pointer;flex-shrink:0;user-select:none}.lp-hdr:hover{background:var(--azul-hover)}
    .lp-ico{font-size:.95rem;filter:grayscale(1) brightness(10);flex-shrink:0}.lp-ttl{font-size:.68rem;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.08em}
    .lp-cnt{margin-left:auto;font-size:.55rem;font-weight:700;background:var(--amarelo);color:var(--azul);padding:.12em .45em;border-radius:100px;min-width:16px;text-align:center}
    .lp-srch{padding:.4rem .6rem;border-bottom:1px solid var(--borda);flex-shrink:0}
    .lp-srch input{width:100%;font-family:var(--font);font-size:.72rem;padding:.4rem .6rem;border:1.5px solid var(--borda);border-radius:5px;outline:none}.lp-srch input:focus{border-color:var(--azul)}
    .lp-body{overflow-y:auto;flex:1}

    .lg{border-bottom:1px solid var(--borda)}.lg:last-child{border-bottom:none}.lg.hid{display:none}
    .lg-h{padding:.5rem .85rem;display:flex;align-items:center;gap:.4rem;cursor:pointer;user-select:none;transition:background .12s}.lg-h:hover{background:var(--cinza-bg)}
    .lg-ch{font-size:.5rem;color:var(--cinza-aux);transition:transform .2s;width:11px;text-align:center;flex-shrink:0}.lg-h.open .lg-ch{transform:rotate(90deg)}
    .lg-dt{width:8px;height:8px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.1)}.lg-nm{font-size:.68rem;font-weight:700;color:var(--cinza-txt);flex:1}
    .lg-ta{font-size:.5rem;font-weight:700;text-transform:uppercase;color:var(--azul);opacity:.5;cursor:pointer;padding:1px 4px;border-radius:3px}.lg-ta:hover{opacity:1;background:var(--azul-claro)}
    .lg-it{display:none;padding:0 0 .3rem}.lg-h.open+.lg-it{display:block}

    .li{display:flex;align-items:center;gap:.4rem;padding:.25rem .85rem .25rem 2rem;cursor:pointer;transition:background .1s;user-select:none}.li.hid{display:none}.li:hover{background:var(--cinza-bg)}
    .li-ck{width:15px;height:15px;border-radius:3px;border:1.5px solid var(--borda);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.55rem;color:#fff;transition:all .15s}
    .li.on .li-ck{color:#fff}
    .li-sw{flex-shrink:0}.li-sw.ln{width:16px;height:3px;border-radius:2px}.li-sw.ld{width:16px;height:0;border-top:2.5px dashed}.li-sw.pt{width:7px;height:7px;border-radius:50%}.li-sw.pg{width:12px;height:9px;border-radius:2px;opacity:.6;border:1.5px solid}
    .li-sw.ico{font-size:.75rem;width:16px;text-align:center}
    .li-lb{font-size:.64rem;font-weight:500;color:var(--cinza-med);line-height:1.15}.li.on .li-lb{color:var(--cinza-txt);font-weight:600}

    /* MINI BI */
    .bi{position:absolute;top:10px;left:10px;z-index:800;background:var(--branco);border-radius:var(--radius);box-shadow:var(--shadow-lg);width:300px;max-height:calc(100% - 20px);display:none;flex-direction:column;overflow:hidden;animation:slideIn .3s ease}.bi.show{display:flex}
    .bi-hdr{padding:.6rem .85rem;background:var(--azul);display:flex;align-items:center;gap:.5rem;flex-shrink:0}.bi-hdr-ttl{font-size:.72rem;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.06em;flex:1}
    .bi-close{background:none;border:none;color:rgba(255,255,255,.6);font-size:1rem;cursor:pointer;padding:2px 6px;border-radius:4px}.bi-close:hover{color:#fff;background:rgba(255,255,255,.15)}
    .bi-body{overflow-y:auto;flex:1;padding:.75rem .85rem}
    .bi-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.75rem}
    .bi-stat{background:var(--azul-claro);border:1px solid var(--azul-borda);border-radius:8px;padding:.6rem .7rem;text-align:center}
    .bi-stat-val{font-size:1.1rem;font-weight:900;color:var(--azul);line-height:1}.bi-stat-lbl{font-size:.52rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--cinza-aux);margin-top:.2rem}
    .bi-section{font-size:.62rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--cinza-med);margin-bottom:.4rem;padding-bottom:.25rem;border-bottom:1px solid var(--borda)}
    .bi-bar-wrap{margin-bottom:.75rem}.bi-bar-row{display:flex;align-items:center;gap:.4rem;margin-bottom:.3rem}
    .bi-bar-label{font-size:.6rem;font-weight:600;color:var(--cinza-med);width:80px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .bi-bar-track{flex:1;height:14px;background:var(--cinza-bg);border-radius:3px;overflow:hidden}.bi-bar-fill{height:100%;border-radius:3px;transition:width .4s ease}
    .bi-bar-val{font-size:.55rem;font-weight:700;color:var(--cinza-aux);width:35px;text-align:right;flex-shrink:0}

    .load-pill{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);z-index:800;background:var(--branco);border-radius:100px;box-shadow:var(--shadow-lg);padding:.4rem 1rem;display:none;align-items:center;gap:.5rem;font-size:.72rem;font-weight:600;color:var(--azul)}.load-pill.show{display:flex}
    .load-sp{width:13px;height:13px;border:2px solid var(--azul-borda);border-top-color:var(--azul);border-radius:50%;animation:spin .6s linear infinite}
    .coord{position:absolute;bottom:8px;right:8px;z-index:800;background:rgba(0,45,114,.85);color:#fff;font-size:.55rem;font-weight:600;padding:2px 7px;border-radius:4px;font-variant-numeric:tabular-nums}

    .leaflet-popup-content-wrapper{border-radius:10px!important;font-family:var(--font)!important;box-shadow:var(--shadow-lg)!important;border:1.5px solid var(--borda)!important}
    .leaflet-popup-content{font-size:.75rem!important;line-height:1.4!important;margin:10px 14px!important}
    .pp-t{font-weight:800;color:var(--azul);font-size:.82rem;margin-bottom:4px;border-bottom:1.5px solid var(--azul-claro);padding-bottom:3px}
    .pp-r{display:flex;gap:.2rem;padding:1.5px 0}.pp-k{font-weight:700;color:var(--cinza-aux);font-size:.6rem;text-transform:uppercase;white-space:nowrap}.pp-v{font-weight:500;color:var(--cinza-txt)}

    /* Custom icons */
    .ico-marker{background:transparent!important;border:none!important;box-shadow:none!important}
    .ico-inner{display:flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;font-size:14px;box-shadow:0 2px 6px rgba(0,0,0,.3);border:2px solid #fff}
    /* Bairro labels */
    .bairro-label{background:transparent!important;border:none!important;box-shadow:none!important}
    .bairro-label div{font-family:var(--font);font-size:.55rem;font-weight:700;color:var(--roxo);text-shadow:0 0 3px #fff,0 0 3px #fff,0 0 3px #fff;white-space:nowrap;pointer-events:none}
    /* Municipio labels */
    .mun-label{background:transparent!important;border:none!important;box-shadow:none!important}
    .mun-label div{font-family:var(--font);font-size:.6rem;font-weight:700;color:var(--azul);text-shadow:0 0 4px #fff,0 0 4px #fff;white-space:nowrap;pointer-events:none}

    /* FILTRO RAMAL */
    .rf{position:absolute;bottom:14px;left:10px;z-index:800;background:var(--branco);border-radius:var(--radius);box-shadow:var(--shadow-lg);width:290px;display:none;flex-direction:column;overflow:hidden;animation:slideIn .3s ease}.rf.show{display:flex}
    .rf-hdr{padding:.5rem .85rem;background:var(--amarelo);display:flex;align-items:center;gap:.5rem;flex-shrink:0}
    .rf-ico{font-size:.9rem}.rf-ttl{font-size:.68rem;font-weight:800;color:var(--azul);text-transform:uppercase;letter-spacing:.07em;flex:1}
    .rf-badge{font-size:.55rem;font-weight:700;background:var(--azul);color:#fff;padding:.15em .5em;border-radius:100px}
    .rf-body{padding:.6rem .75rem;display:flex;flex-direction:column;gap:.45rem}
    .rf-label{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--cinza-aux)}
    .rf-select{width:100%;font-family:var(--font);font-size:.72rem;padding:.38rem .55rem;border:1.5px solid var(--borda);border-radius:6px;outline:none;color:var(--cinza-txt);background:var(--cinza-bg);cursor:pointer}.rf-select:focus{border-color:var(--amarelo)}
    .rf-input{width:100%;font-family:var(--font);font-size:.72rem;padding:.38rem .55rem;border:1.5px solid var(--borda);border-radius:6px;outline:none;color:var(--cinza-txt)}.rf-input:focus{border-color:var(--amarelo)}
    .rf-result{font-size:.62rem;font-weight:600;color:var(--cinza-aux);text-align:center;padding:.2rem 0}
    .rf-btn{width:100%;font-family:var(--font);font-size:.68rem;font-weight:700;padding:.38rem;border:none;border-radius:6px;cursor:pointer;background:var(--azul-claro);color:var(--azul);transition:background .15s}.rf-btn:hover{background:var(--azul-borda)}

    @media(max-width:540px){.lp{width:240px;right:6px;top:6px}.lp.collapsed{width:38px}.bi{width:calc(100% - 12px);left:6px}.rf{width:calc(100% - 12px);left:6px;bottom:6px}}
  </style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">Governo do Estado do Amazonas &middot; SEINFRA</div>
  <div class="topbar-right"><span class="topbar-dot"></span> DMOB</div>
</div>
<header class="site-header">
  <div class="header-brand">
    <div class="brand-escudo">&#127758;</div>
    <div>
      <div class="brand-sup">SEINFRA &middot; DMOB</div>
      <div class="brand-name">Atlas <span>Amazonas</span></div>
    </div>
  </div>
  <div class="header-nav">
    <a class="header-back" href="https://leonzordhue.github.io/painel-dmob/" target="_blank">&#8592; Painel</a>
    <div class="header-badge">Infraestrutura &amp; Mobilidade</div>
  </div>
</header>
<div class="map-wrap">
  <div id="map"></div>
  <div class="lp" id="lp">
    <div class="lp-hdr" onclick="togglePanel()"><span class="lp-ico">&#128209;</span><span class="lp-ttl">Camadas</span><span class="lp-cnt" id="lpCnt">0</span></div>
    <div class="lp-srch"><input id="lSrch" type="text" placeholder="Filtrar camadas..." oninput="filterLayers(this.value)"/></div>
    <div class="lp-body" id="lpBody"></div>
  </div>
  <div class="bi" id="biPanel">
    <div class="bi-hdr"><span class="bi-hdr-ttl" id="biTitle"></span><button class="bi-close" onclick="closeBi()">&#10005;</button></div>
    <div class="bi-body" id="biBody"></div>
  </div>
  <div class="load-pill" id="loadPill"><div class="load-sp"></div><span id="loadTxt">Carregando...</span></div>
  <div class="coord" id="coord">-3.12 S, 60.02 W</div>
  <!-- FILTRO RAMAIS -->
  <div class="rf" id="rfPanel">
    <div class="rf-hdr"><span class="rf-ico">🔍</span><span class="rf-ttl">Filtro — Ramais</span><span class="rf-badge" id="rfCount">0</span></div>
    <div class="rf-body">
      <div>
        <div class="rf-label">Município</div>
        <select class="rf-select" id="rfMun" onchange="applyRamalFilter()"><option value="">Todos os municípios</option></select>
      </div>
      <div>
        <div class="rf-label">Pesquisar ramal</div>
        <input class="rf-input" id="rfSearch" type="text" placeholder="Nome do ramal..." oninput="applyRamalFilter()"/>
      </div>
      <div class="rf-result" id="rfResult"></div>
      <button class="rf-btn" onclick="clearRamalFilter()">✕ Limpar filtros</button>
    </div>
  </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

// TERRITORIAL
{id:'municipios',group:'Territorial',gc:'#0E8A7D',gi:'\ud83c\udfe0',label:'Divisas Municipais',gt:'polygon',st:{color:'#0E8A7D',fillColor:'#0E8A7D',fillOpacity:.03,weight:1.5,opacity:.6},ckColor:'#0E8A7D',file:'AM_MUNICIPIOS.geojson',pt:function(p){return p['NM_MUN']||'Munic\u00edpio'},pf:[{k:'NM_MUN',l:'Munic\u00edpio'},{k:'CD_MUN',l:'C\u00f3d. IBGE'},{k:'NM_RGINT',l:'Regi\u00e3o'},{k:'AREA_KM2',l:'\u00c1rea(km\u00b2)'}],labels:{field:'NM_MUN',cls:'mun-label',minZoom:8}},
{id:'bairros',group:'Territorial',gc:'#0E8A7D',gi:'\ud83c\udfe0',label:'Bairros',gt:'polygon',st:{color:'#6C3483',fillColor:'#6C3483',fillOpacity:.08,weight:1,opacity:.5},ckColor:'#6C3483',file:'BAIRROS.geojson',pt:function(p){return p['NM_BAIRRO']||'Bairro'},pf:[{k:'NM_BAIRRO',l:'Bairro'},{k:'NM_MUN',l:'Munic\u00edpio'},{k:'NM_DIST',l:'Distrito'},{k:'AREA_KM2',l:'\u00c1rea(km\u00b2)'}],labels:{field:'NM_BAIRRO',cls:'bairro-label',minZoom:12}},
{id:'uc',group:'Territorial',gc:'#0E8A7D',gi:'\ud83c\udfe0',label:'Unid. de Conserva\u00e7\u00e3o',gt:'polygon',st:{color:'#007B3E',fillColor:'#007B3E',fillOpacity:.1,weight:1.5,opacity:.6},ckColor:'#007B3E',file:'UNIDADE_DE_CONSERVACAO.geojson',pt:function(p){return p['nome']||'UC'},pf:[{k:'nome',l:'Nome'},{k:'categoria',l:'Categoria'},{k:'grupo',l:'Grupo'},{k:'esfera',l:'Esfera'},{k:'ano_cria',l:'Ano'},{k:'AREA_KM2',l:'\u00c1rea(km\u00b2)'}]},

// PATRIMONIO
{id:'sitios',group:'Patrim\u00f4nio Cultural',gc:'#C2185B',gi:'\ud83c\udfdb\ufe0f',label:'S\u00edtios Arqueol\u00f3gicos (IPHAN)',gt:'point',st:{color:'#C2185B',radius:5},ckColor:'#C2185B',file:'SITIOS_ARQ_-_IPHAN.geojson',pt:function(p){return p['identifica']||'S\u00edtio'},pf:[{k:'identifica',l:'Identifica\u00e7\u00e3o'},{k:'ds_naturez',l:'Natureza'},{k:'ds_classif',l:'Classifica\u00e7\u00e3o'},{k:'ds_tipo_be',l:'Tipo'},{k:'co_iphan',l:'C\u00f3d. IPHAN'}]},
];

var map=L.map('map',{center:[-3.4,-64],zoom:6,zoomControl:false,attributionControl:false});
L.control.zoom({position:'bottomright'}).addTo(map);
var BASES={'Padr\u00e3o':L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}),'Sat\u00e9lite':L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:18}),'Topo':L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{maxZoom:17}),'Escuro':L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19})};
var aBase='Padr\u00e3o';BASES[aBase].addTo(map);

map.on('mousemove',function(e){var la=e.latlng.lat.toFixed(4),lo=e.latlng.lng.toFixed(4);document.getElementById('coord').textContent=Math.abs(la)+'\u00b0 '+(la<0?'S':'N')+', '+Math.abs(lo)+'\u00b0 '+(lo<0?'W':'E')});

var S={};REG.forEach(function(c){S[c.id]={c:c,lyr:null,lblLyr:null,data:null,ok:false}});

function buildPanel(){var body=document.getElementById('lpBody');var G={};REG.forEach(function(c){if(!G[c.group])G[c.group]={gc:c.gc,gi:c.gi,items:[]};G[c.group].items.push(c)});var h='';
Object.keys(G).forEach(function(gn){var g=G[gn];var ao=g.items.some(function(c){return c.on});
h+='<div class="lg" data-g="'+gn+'"><div class="lg-h'+(ao?' open':'')+'" onclick="tgGrp(this)"><span class="lg-ch">\u25b6</span><span class="lg-dt" style="background:'+g.gc+'"></span><span class="lg-nm">'+g.gi+' '+gn+'</span><span class="lg-ta" onclick="event.stopPropagation();tgAll(\''+gn+'\')">todos</span></div><div class="lg-it">';
g.items.forEach(function(c){var a=c.on?' on':'';
var swHtml='';
if(c.gt==='icon')swHtml='<span class="li-sw ico">'+c.icon+'</span>';
else if(c.gt==='point')swHtml='<span class="li-sw pt" style="background:'+c.st.color+'"></span>';
else if(c.gt==='polygon')swHtml='<span class="li-sw pg" style="background:'+(c.st.fillColor||c.st.color)+';border-color:'+c.st.color+'"></span>';
else if(c.gt==='line-dash')swHtml='<span class="li-sw ld" style="border-color:'+c.st.color+'"></span>';
else swHtml='<span class="li-sw ln" style="background:'+c.st.color+'"></span>';
var ckStyle=c.on?'background:'+c.ckColor+';border-color:'+c.ckColor:'';
h+='<div class="li'+a+'" data-id="'+c.id+'" data-lb="'+c.label.toLowerCase()+'" data-ck="'+c.ckColor+'" onclick="tgLyr(\''+c.id+'\',this)"><span class="li-ck" style="'+ckStyle+'">'+(c.on?'\u2713':'')+'</span>'+swHtml+'<span class="li-lb">'+c.label+'</span></div>'});
h+='</div></div>'});
h+='<div class="lg" data-g="__base"><div class="lg-h" onclick="tgGrp(this)"><span class="lg-ch">\u25b6</span><span class="lg-dt" style="background:#555"></span><span class="lg-nm">\ud83c\udf10 Mapa Base</span></div><div class="lg-it">';
Object.keys(BASES).forEach(function(n,i){h+='<div class="li'+(i===0?' on':'')+'" data-base="'+n+'" data-ck="#555" onclick="swBase(\''+n+'\',this)"><span class="li-ck" style="'+(i===0?'background:#555;border-color:#555':'')+'">'+(i===0?'\u2713':'')+'</span><span class="li-sw ln" style="background:#888"></span><span class="li-lb">'+n+'</span></div>'});
h+='</div></div>';body.innerHTML=h;updCnt()}

function tgLyr(id,el){var st=S[id];var isOn=el.classList.toggle('on');var ck=el.querySelector('.li-ck');var col=el.dataset.ck;
if(isOn){ck.textContent='\u2713';ck.style.background=col;ck.style.borderColor=col}else{ck.textContent='';ck.style.background='';ck.style.borderColor=''}
if(isOn){if(!st.ok){showLoad('Carregando '+st.c.label+'...');fetch(REPO+st.c.file).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()}).then(function(data){st.data=data;st.ok=true;hideLoad();addLayer(st);updCnt()}).catch(function(e){hideLoad();el.classList.remove('on');ck.textContent='';ck.style.background='';ck.style.borderColor='';alert('Erro: '+st.c.label+'\n'+e.message)});return}addLayer(st)}else{rmLayer(st)}updCnt()}

function addLayer(st){var c=st.c;st.lyr=mkLyr(c,st.data);st.lyr.addTo(map);
if(c.labels){st.lblLyr=L.layerGroup();addLabels(st);st.lblLyr.addTo(map);map.on('zoomend',function(){toggleLabels(st)})}
if(c.bi)buildBi(c,st.data);
if(c.id==='ramais')openRamalFilter(st.data)}

function rmLayer(st){if(st.lyr){map.removeLayer(st.lyr);st.lyr=null}if(st.lblLyr){map.removeLayer(st.lblLyr);st.lblLyr=null}if(st.c.bi)closeBi();if(st.c.id==='ramais')closeRamalFilter()}

function addLabels(st){var c=st.c;st.data.features.forEach(function(f){var name=f.properties[c.labels.field];if(!name)return;var geo=f.geometry;var center=getCentroid(geo);if(!center)return;var lbl=L.marker(center,{icon:L.divIcon({className:c.labels.cls,html:'<div>'+name+'</div>',iconSize:[0,0]})});st.lblLyr.addLayer(lbl)});toggleLabels(st)}

function toggleLabels(st){if(!st.lblLyr||!st.c.labels)return;var z=map.getZoom();if(z>=st.c.labels.minZoom){if(!map.hasLayer(st.lblLyr))map.addLayer(st.lblLyr)}else{if(map.hasLayer(st.lblLyr))map.removeLayer(st.lblLyr)}}

function getCentroid(geo){if(!geo)return null;var coords;if(geo.type==='Polygon')coords=geo.coordinates[0];else if(geo.type==='MultiPolygon'){var biggest=geo.coordinates.reduce(function(b,p){return p[0].length>b[0].length?p:b});coords=biggest[0]}else return null;
var cx=0,cy=0;coords.forEach(function(c){cx+=c[0];cy+=c[1]});return[cy/coords.length,cx/coords.length]}

function mkLyr(c,data){
if(c.gt==='icon'){return L.geoJSON(data,{pointToLayer:function(_,ll){return L.marker(ll,{icon:L.divIcon({className:'ico-marker',html:'<div class="ico-inner" style="background:'+c.st.color+'">'+c.icon+'</div>',iconSize:[24,24],iconAnchor:[12,12]})})},onEachFeature:function(f,l){mkPop(f,l,c)}})}
if(c.gt==='point'){return L.geoJSON(data,{pointToLayer:function(_,ll){return L.circleMarker(ll,{radius:c.st.radius||5,fillColor:c.st.color,color:'#fff',weight:1.5,fillOpacity:.85})},onEachFeature:function(f,l){mkPop(f,l,c)}})}
return L.geoJSON(data,{style:function(){return{color:c.st.color,weight:c.st.weight||2,opacity:c.st.opacity||.8,dashArray:c.st.dashArray||null,fillColor:c.st.fillColor||'transparent',fillOpacity:c.st.fillOpacity||0}},onEachFeature:function(f,l){mkPop(f,l,c)}})}

function mkPop(feat,layer,c){var p=feat.properties||{};
if(c.gt!=='point'&&c.gt!=='icon'){layer.on('mouseover',function(){layer.setStyle({weight:(c.st.weight||2)+2,opacity:1})});layer.on('mouseout',function(){layer.setStyle({weight:c.st.weight||2,opacity:c.st.opacity||.8})})}
layer.on('click',function(){var t;try{t=c.pt(p)}catch(e){t=c.label}
var rows=(c.pf||[]).map(function(fd){var v=p[fd.k];if(v===null||v===undefined||v==='')return '';var d=typeof v==='number'?v.toLocaleString('pt-BR'):v;return '<div class="pp-r"><span class="pp-k">'+fd.l+':</span> <span class="pp-v">'+d+'</span></div>'}).filter(Boolean).join('');
layer.bindPopup('<div class="pp-t">'+t+'</div>'+(rows||'<span style="color:#aaa;font-size:.65rem">Sem dados</span>')).openPopup()})}

function buildBi(c,data){var bi=c.bi;document.getElementById('biTitle').textContent=bi.title;var h='';
if(bi.stats){h+='<div class="bi-stat-grid">';bi.stats.forEach(function(s){var v=s.fn(data);h+='<div class="bi-stat"><div class="bi-stat-val">'+(typeof v==='number'?v.toLocaleString('pt-BR'):v)+'</div><div class="bi-stat-lbl">'+s.label+'</div></div>'});h+='</div>'}
if(bi.bars){bi.bars.forEach(function(bar){var counts={};data.features.forEach(function(f){var v=f.properties[bar.field];if(v!==null&&v!==undefined&&v!==''){var key=String(v).trim().substring(0,25);counts[key]=(counts[key]||0)+1}});
var sorted=Object.entries(counts).sort(function(a,b){return b[1]-a[1]}).slice(0,bar.top);if(!sorted.length)return;var mx=sorted[0][1];
h+='<div class="bi-section">'+bar.label+'</div><div class="bi-bar-wrap">';sorted.forEach(function(e){var pct=Math.round(e[1]/mx*100);h+='<div class="bi-bar-row"><span class="bi-bar-label" title="'+e[0]+'">'+e[0]+'</span><div class="bi-bar-track"><div class="bi-bar-fill" style="width:'+pct+'%;background:'+bar.color+'"></div></div><span class="bi-bar-val">'+e[1]+'</span></div>'});h+='</div>'})}
document.getElementById('biBody').innerHTML=h;document.getElementById('biPanel').classList.add('show')}
function closeBi(){document.getElementById('biPanel').classList.remove('show')}

function tgAll(gn){var items=document.querySelectorAll('.lg[data-g="'+gn+'"] .li[data-id]');var allOn=Array.from(items).every(function(e){return e.classList.contains('on')});items.forEach(function(e){var isOn=e.classList.contains('on');if(allOn&&isOn)tgLyr(e.dataset.id,e);if(!allOn&&!isOn)tgLyr(e.dataset.id,e)})}
function swBase(n,el){if(n===aBase)return;map.removeLayer(BASES[aBase]);BASES[n].addTo(map);BASES[n].bringToBack();aBase=n;
document.querySelectorAll('[data-base]').forEach(function(e){e.classList.remove('on');var ck=e.querySelector('.li-ck');ck.textContent='';ck.style.background='';ck.style.borderColor=''});
el.classList.add('on');var ck=el.querySelector('.li-ck');ck.textContent='\u2713';ck.style.background='#555';ck.style.borderColor='#555'}
function filterLayers(q){q=q.toLowerCase().trim();document.querySelectorAll('.li[data-id]').forEach(function(e){e.classList.toggle('hid',q&&!e.dataset.lb.includes(q))});document.querySelectorAll('.lg[data-g]').forEach(function(g){if(g.dataset.g==='__base')return;var vis=g.querySelectorAll('.li[data-id]:not(.hid)');g.classList.toggle('hid',q&&vis.length===0);if(q&&vis.length>0)g.querySelector('.lg-h').classList.add('open')})}
function togglePanel(){document.getElementById('lp').classList.toggle('collapsed')}
function tgGrp(el){el.classList.toggle('open')}
function updCnt(){document.getElementById('lpCnt').textContent=document.querySelectorAll('.li.on[data-id]').length}
function showLoad(t){document.getElementById('loadTxt').textContent=t;document.getElementById('loadPill').classList.add('show')}
function hideLoad(){document.getElementById('loadPill').classList.remove('show')}

// ===== FILTRO RAMAIS =====
function openRamalFilter(data){
  var muns=[];
  data.features.forEach(function(f){var m=f.properties['Município']||f.properties['Municipio'];if(m&&muns.indexOf(m)<0)muns.push(m)});
  muns.sort(function(a,b){return a.localeCompare(b,'pt-BR')});
  var sel=document.getElementById('rfMun');
  sel.innerHTML='<option value="">Todos os municípios</option>';
  muns.forEach(function(m){var o=document.createElement('option');o.value=m;o.textContent=m;sel.appendChild(o)});
  document.getElementById('rfSearch').value='';
  document.getElementById('rfPanel').classList.add('show');
  applyRamalFilter();
}
function closeRamalFilter(){document.getElementById('rfPanel').classList.remove('show')}

function applyRamalFilter(){
  var st=S['ramais'];if(!st||!st.lyr)return;
  var mun=document.getElementById('rfMun').value.toLowerCase().trim();
  var srch=document.getElementById('rfSearch').value.toLowerCase().trim();
  var total=0,shown=0;
  st.lyr.eachLayer(function(l){
    var p=l.feature.properties||{};
    var pm=(p['Município']||p['Municipio']||'').toLowerCase();
    var pn=(p['Descrição']||p['Descri\u00e7\u00e3']||p['Descri\u00e7_1']||'').toLowerCase();
    var okM=!mun||pm===mun;
    var okS=!srch||pn.includes(srch)||pm.includes(srch);
    total++;
    if(okM&&okS){l.setStyle({opacity:.8,weight:2});shown++;if(l._path)l._path.style.display=''}
    else{l.setStyle({opacity:0,weight:0});if(l._path)l._path.style.display='none'}
  });
  document.getElementById('rfCount').textContent=shown;
  document.getElementById('rfResult').textContent=shown===total?'Exibindo todos os '+total+' ramais':'Exibindo '+shown+' de '+total+' ramais';
}
function clearRamalFilter(){
  document.getElementById('rfMun').value='';
  document.getElementById('rfSearch').value='';
  applyRamalFilter();
}
// ===== FIM FILTRO RAMAIS =====

buildPanel();
document.querySelectorAll('.li.on[data-id]').forEach(function(el){el.classList.remove('on');var ck=el.querySelector('.li-ck');ck.textContent='';ck.style.background='';ck.style.borderColor='';tgLyr(el.dataset.id,el)});
</script>
</body>
